<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страница не найдена | Резервуаростроение</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#0f2f4a" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <style>
      :root{--bg:#f5f7fa;--card:#ffffff;--text:#0f2f4a;--muted:#5f7285;--accent:#1e6fae;--border:rgba(15,47,74,.12);--shadow:0 12px 30px rgba(15,47,74,.08);--radius:18px}
      *{box-sizing:border-box}
      body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
      .shell{max-width:960px;margin:0 auto;padding:32px 20px}
      .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}
      h1{font-size:42px;line-height:1.05;margin:0 0 14px}
      p{font-size:18px;line-height:1.6;color:var(--muted);margin:0 0 16px}
      .badge{display:inline-flex;padding:7px 12px;border-radius:999px;background:#e9f2fb;color:var(--accent);font-weight:800;font-size:12px;margin-bottom:14px}
      .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px}
      .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--text);text-decoration:none;font-weight:800}
      .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="badge">Ошибка 404</div>
        <h1>Страница не найдена</h1>
        <p>Проверьте адрес страницы или вернитесь в один из основных разделов сайта.</p>
        <div class="actions">
          <a class="btn primary" href="/">На главную</a>
          <a class="btn" href="/calc/rvs">РВС калькулятор</a>
          <a class="btn" href="/baza-znaniy/">База знаний</a>
        </div>
      </section>
    </main>
  </body>
</html>
