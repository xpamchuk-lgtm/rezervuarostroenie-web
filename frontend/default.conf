server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location = / {
        try_files /index.html =404;
    }

    location ^~ /calc/ {
        try_files /index.html =404;
    }

    location = /baza-znaniy {
        return 301 /baza-znaniy/;
    }

    location ^~ /baza-znaniy/ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(?:css|js|mjs|json|png|jpe?g|gif|svg|ico|webp|xml|txt|webmanifest|html)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        return 404;
    }
}
