server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://*.yandex.ru; connect-src 'self' https://mc.yandex.ru https://*.yandex.ru; img-src 'self' data: https://mc.yandex.ru https://*.yandex.ru; style-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location = / {
        try_files /index.html =404;
    }

    location ^~ /calc/ {
        try_files /index.html =404;
    }

    location = /baza-znaniy {
        return 301 /baza-znaniy/;
    }

    location ^~ /baza-znaniy/ {
        try_files $uri $uri/ $uri/index.html =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://*.yandex.ru; connect-src 'self' https://mc.yandex.ru https://*.yandex.ru; img-src 'self' data: https://mc.yandex.ru https://*.yandex.ru; style-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    location = /articles {
        return 301 /articles/;
    }

    location = /articles/index.html {
        return 301 /articles/;
    }

    location = /articles/pochemu-vertikalnye-shvy-stenki-rvs-delayut-s-razbezhkoy-65/ {
        return 301 /articles/pochemu-vertikalnye-shvy-stenki-rvs-delayut-s-razbezhkoy/;
    }

    location ^~ /articles/ {
        try_files $uri $uri/ $uri/index.html =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://*.yandex.ru; connect-src 'self' https://mc.yandex.ru https://*.yandex.ru; img-src 'self' data: https://mc.yandex.ru https://*.yandex.ru; style-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    include /etc/nginx/conf.d/kb-root-redirects.conf;

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(?:css|js|mjs|json|png|jpe?g|gif|svg|ico|webp|xml|txt|webmanifest|html)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        return 404;
    }
}
