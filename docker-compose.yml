services:
  backend:
    build: ./backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PROJECT_ORDER_EMAIL_TO: ${PROJECT_ORDER_EMAIL_TO:-rezervuarostroenie@yandex.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.yandex.ru}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SSL: ${SMTP_SSL:-1}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://rezervuarostroenie.ru}
      PROJECT_ORDER_MAX_FILE_BYTES: ${PROJECT_ORDER_MAX_FILE_BYTES:-10485760}
      PROJECT_ORDER_RATE_LIMIT: ${PROJECT_ORDER_RATE_LIMIT:-5}
      PROJECT_ORDER_RATE_WINDOW_SECONDS: ${PROJECT_ORDER_RATE_WINDOW_SECONDS:-600}
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/rezervuarostroenie.ru/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/rezervuarostroenie.ru/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - backend
      - frontend
